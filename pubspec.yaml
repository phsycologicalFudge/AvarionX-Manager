name: colourswift_manager
description: Manager for ColourSwift apps
publish_to: "none"
version: 1.0.0+1002

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.4
  permission_handler: ^11.4.0
  path_provider: ^2.1.2
  path: ^1.9.0
  shared_preferences: ^2.3.2
  percent_indicator: ^4.2.3
  animate_do: ^3.3.4
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  intl: ^0.20.2
  provider: ^6.1.2
  open_filex: ^4.4.0
  workmanager: ^0.6.0
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/icon.png
    - assets/apps/css_file_manager2.png
    - assets/apps/css_security2.png

flutter_icons:
  android: true
  ios: false
  image_path: assets/icon/icon.png

flutter_native_splash:
  color: "#121212"
  image: assets/icons/splash_logo.png
  branding_mode: center
  android_12:
    image: assets/icons/splash_logo.png
    color: "#121212"
